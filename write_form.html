<section id="consult">
  <div class="wrap">
    <div class="section-head">
      <h2 class="section-title">전문가 상담 신청</h2>
      <span class="section-note">상담 신청 시 담당자가 연락드립니다</span>
    </div>

    <form class="consult" onsubmit="return submitConsult(event)">
      <div class="consult-grid">
        <div>
          <label for="name">이름</label>
          <input id="name" type="text" required placeholder="홍길동">
        </div>
        <div>
          <label for="phone">연락처</label>
          <input id="phone" type="tel" required placeholder="010-1234-5678">
        </div>
        <div>
          <label for="planField">관심 상품</label>
          <input id="planField" type="text" placeholder="예: 종신보험, 변액보험 등">
        </div>
        <div>
          <label for="region">거주 지역</label>
          <input id="region" type="text" placeholder="예: 서울">
        </div>
        <div class="full">
          <label for="msg">문의사항</label>
          <textarea id="msg" rows="3" placeholder="궁금한 점을 자유롭게 남겨주세요."></textarea>
        </div>
      </div>
      <input type="text" id="website" name="website" autocomplete="off" tabindex="-1" style="position:absolute; left:-9999px; width:1px; height:1px; opacity:0;" aria-hidden="true">
      <button type="submit" class="tripinsu-btn tripinsu-btn-block" id="consultSubmitBtn">상담 신청하기</button>
      <div class="consult-success" id="consultSuccess">신청이 접수되었습니다. 담당자가 남겨주신 연락처로 안내드립니다.</div>
      <div class="consult-error" id="consultError">신청에 실패했습니다. 잠시 후 다시 시도해주세요.</div>
    </form>
  </div>
</section>

<script>
  function submitConsult(e) {
    e.preventDefault();
    const form = e.target;
    const btn = document.getElementById('consultSubmitBtn');
    const successEl = document.getElementById('consultSuccess');
    const errorEl = document.getElementById('consultError');
    successEl.style.display = 'none';
    errorEl.style.display = 'none';
    btn.disabled = true;
    btn.textContent = '전송 중...';

    const body = new URLSearchParams({
      product: 'INSURANCE',
      name: document.getElementById('name').value,
      phone: document.getElementById('phone').value,
      interest: document.getElementById('planField').value,
      goal: document.getElementById('region').value,
      message: document.getElementById('msg').value,
      website: document.getElementById('website').value,
    });

    fetch('/api/consult/', { method: 'POST', headers: { 'Content-Type': 'application/x-www-form-urlencoded' }, body })
      .then(res => res.json().catch(() => ({ ok: false })))
      .then(data => {
        if (data.ok) {
          successEl.style.display = 'block';
          form.reset();
        } else {
          errorEl.style.display = 'block';
        }
      })
      .catch(() => { errorEl.style.display = 'block'; })
      .finally(() => {
        btn.disabled = false;
        btn.textContent = '상담 신청하기';
      });
    return false;
  }
</script>
